specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: APEXVault
    network: chapel
    source:
      address: "0x778e166511eF60FC1A337395FB74a395afa233FC"
      abi: APEXVault
      startBlock: 51000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - HedgeSnapshot
        - VaultDeposit
        - VaultWithdraw
      abis:
        - name: APEXVault
          file: ../contracts/artifacts/contracts/core/APEXVault.sol/APEXVault.json
      eventHandlers:
        - event: Deposited(indexed address,uint256,uint256,uint256)
          handler: handleDeposited
        - event: Withdrawn(indexed address,uint256,uint256,uint256,uint256)
          handler: handleWithdrawn
        - event: HedgeSnapshotRecorded(uint256,uint256,uint256,uint256,uint256)
          handler: handleHedgeSnapshotRecorded
      file: ./src/mappings.ts
  - kind: ethereum
    name: APEXCompounder
    network: chapel
    source:
      address: "0xAe0F4EE1A339a70359EA06f41964399Ab10B5206"
      abi: APEXCompounder
      startBlock: 51000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - CompoundEvent
      abis:
        - name: APEXCompounder
          file: ../contracts/artifacts/contracts/core/APEXCompounder.sol/APEXCompounder.json
      eventHandlers:
        - event: Compounded(uint256,uint256,uint256,uint256,indexed address,uint256)
          handler: handleCompounded
      file: ./src/mappings.ts
  - kind: ethereum
    name: APEXBrain
    network: chapel
    source:
      address: "0x0aEEB68b11f1ecEb3ED87bE898250ea44B4b8271"
      abi: APEXBrain
      startBlock: 51000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - SplitUpdate
      abis:
        - name: APEXBrain
          file: ../contracts/artifacts/contracts/core/APEXBrain.sol/APEXBrain.json
      eventHandlers:
        - event: SplitUpdated(uint256,uint256,uint256,uint256,string)
          handler: handleSplitUpdated
      file: ./src/mappings.ts
